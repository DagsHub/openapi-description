# OpenAPI documentation for DagsHub
openapi: 3.0.3
info:
  title: DagsHub API
  version: 1.0.3
  description: |
    This API provides a way to retrive & interact with data about DagsHub repositories, users, issues, webhooks and more.
    The API is also used by the [DagsHub Direct Data Access streaming client](https://github.com/DagsHub/client) to stream content from a repository for easier and faster training.
   
servers:
  - url: https://dagshub.com/api/v1
security:
  - basicAuth: []
  - tokenAuth: []
paths:
  /repos/{owner}/{repo}/content/{branch}/{path}:
    get:
      tags:
      - Content
      summary: List data in a repository folder
      description: |
        List files, commit sha1, and versioning type for a folder in repository.
        
        To get sizes add to the query param `include_size=true`. May result in a slower response.
      operationId: getContent
      parameters:
      - $ref: './components/parameters/Owner.yaml'
      - $ref: './components/parameters/Repository.yaml'
      - $ref: './components/parameters/Branch.yaml'
      - $ref: './components/parameters/Path.yaml'
      - $ref: './components/parameters/IncludeSize.yaml'
      responses:
        '200': 
          description: Successfully retrieved the data
          content:
            application/json:
              schema:
                $ref: './components/schemas/Files.yaml'
              example:
                  [
                    {
                      "path": "images/000.png",
                      "type": "file",
                      "size": 0,
                      "hash": "79fb7f8632d7e15b3b46a7411d08bcdd",
                      "versioning": "dvc",
                      "download_url": "https://dagshub.com/api/v1/repos/Simon/baby-yoda-segmentation-dataset/raw/master/images/000.png",
                      "content_url": "https://dagshub.com/api/v1/repos/Simon/baby-yoda-segmentation-dataset/content/master/images/000.png"
                    },
                    {
                      "path": "images/001.png",
                      "type": "file",
                      "size": 0,
                      "hash": "7dd5befce39375036da253b435e1db98",
                      "versioning": "dvc",
                      "download_url": "https://dagshub.com/api/v1/repos/Simon/baby-yoda-segmentation-dataset/raw/master/images/001.png",
                      "content_url": "https://dagshub.com/api/v1/repos/Simon/baby-yoda-segmentation-dataset/content/master/images/001.png"
                    },
                    {
                      "path": "images/002.png",
                      "type": "file",
                      "size": 0,
                      "hash": "a58f181cd982a1e21c77949588737c8b",
                      "versioning": "dvc",
                      "download_url": "https://dagshub.com/api/v1/repos/Simon/baby-yoda-segmentation-dataset/raw/master/images/002.png",
                      "content_url": "https://dagshub.com/api/v1/repos/Simon/baby-yoda-segmentation-dataset/content/master/images/002.png"
                    },
                  ]
        '404':
          description: Non existing path
    put:
      tags:
        - Content
      summary: Upload data to a repository
      operationId: uploadContent
      parameters:
      - $ref: './components/parameters/Owner.yaml'
      - $ref: './components/parameters/Repository.yaml'
      - $ref: './components/parameters/Branch.yaml'
      - $ref: './components/parameters/Path.yaml'
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: './components/schemas/PutFile.yaml'
      responses:
        '200':
          description: Successfully uploaded content
  /repos/{owner}/{repo}/storage:
    get:
      tags:
        - Storage Integrations
      summary: List integrated storages in the repository
      operationId: getBuckets
      parameters:
      - $ref: './components/parameters/storage/Owner.yaml'
      - $ref: './components/parameters/storage/Repository.yaml'
      responses:
        '200':
          description: Successfully listed integrated storages
          content:
            application/json:
              schema:
                $ref: './components/schemas/storage/Integration.yaml'
              example:
                [
                  {
                    "name": "spacenet-dataset",
                    "protocol": "s3",
                    "list_path": "https://dagshub.com/api/v1/repos/DagsHub-Datasets/spacenet-dataset/storage/content/s3/spacenet-dataset"
                  }
                ]
  /repos/{owner}/{repo}/storage/content/{protocol}/{bucket}/{path}: 
    get:
      tags:
        - Storage Integrations
      summary: List contents in the path
      operationId: getBucketContent
      parameters:
      - $ref: './components/parameters/storage/Owner.yaml'
      - $ref: './components/parameters/storage/Repository.yaml'
      - $ref: './components/parameters/storage/Protocol.yaml'
      - $ref: './components/parameters/storage/Bucket.yaml'
      - $ref: './components/parameters/storage/Path.yaml'
      - $ref: './components/parameters/IncludeSize.yaml'
      - $ref: './components/parameters/storage/Limit.yaml'
      - $ref: './components/parameters/storage/Paging.yaml'
      - $ref: './components/parameters/storage/FromToken.yaml'
      responses:
        '200':
          description: Successfully listed a directory
          content:
            application/json:
              schema:
                $ref: './components/schemas/storage/Files.yaml'
              example:
                {
                  "entries": [
                    {
                      "path": "s3/spacenet-dataset",
                      "type": "dir",
                      "size": 0,
                      "hash": "",
                      "versioning": "bucket",
                      "download_url": "",
                      "content_url": "https://dagshub.com/api/v1/repos/DagsHub-Datasets/spacenet-dataset/storage/content/s3/spacenet-dataset"
                    },
                    {
                      "path": "s3/spacenet-dataset/AOIs",
                      "type": "dir",
                      "size": 0,
                      "hash": "",
                      "versioning": "bucket",
                      "download_url": "",
                      "content_url": "https://dagshub.com/api/v1/repos/DagsHub-Datasets/spacenet-dataset/storage/content/s3/spacenet-dataset/AOIs"
                    },
                    {
                      "path": "s3/spacenet-dataset/Hosted-Datasets",
                      "type": "dir",
                      "size": 0,
                      "hash": "",
                      "versioning": "bucket",
                      "download_url": "",
                      "content_url": "https://dagshub.com/api/v1/repos/DagsHub-Datasets/spacenet-dataset/storage/content/s3/spacenet-dataset/Hosted-Datasets"
                    },
                    {
                      "path": "s3/spacenet-dataset/SpaceNet_Off-Nadir_Dataset",
                      "type": "dir",
                      "size": 0,
                      "hash": "",
                      "versioning": "bucket",
                      "download_url": "",
                      "content_url": "https://dagshub.com/api/v1/repos/DagsHub-Datasets/spacenet-dataset/storage/content/s3/spacenet-dataset/SpaceNet_Off-Nadir_Dataset"
                    },
                    {
                      "path": "s3/spacenet-dataset/spacenet-model-weights",
                      "type": "dir",
                      "size": 0,
                      "hash": "",
                      "versioning": "bucket",
                      "download_url": "",
                      "content_url": "https://dagshub.com/api/v1/repos/DagsHub-Datasets/spacenet-dataset/storage/content/s3/spacenet-dataset/spacenet-model-weights"
                    },
                    {
                      "path": "s3/spacenet-dataset/spacenet-stac",
                      "type": "dir",
                      "size": 0,
                      "hash": "",
                      "versioning": "bucket",
                      "download_url": "",
                      "content_url": "https://dagshub.com/api/v1/repos/DagsHub-Datasets/spacenet-dataset/storage/content/s3/spacenet-dataset/spacenet-stac"
                    },
                    {
                      "path": "s3/spacenet-dataset/spacenet",
                      "type": "dir",
                      "size": 0,
                      "hash": "",
                      "versioning": "bucket",
                      "download_url": "",
                      "content_url": "https://dagshub.com/api/v1/repos/DagsHub-Datasets/spacenet-dataset/storage/content/s3/spacenet-dataset/spacenet"
                    },
                    {
                      "path": "s3/spacenet-dataset/LICENSE.md",
                      "type": "file",
                      "size": 299,
                      "hash": "",
                      "versioning": "bucket",
                      "download_url": "https://dagshub.com/api/v1/repos/DagsHub-Datasets/spacenet-dataset/storage/raw/s3/spacenet-dataset/LICENSE.md",
                      "content_url": "https://dagshub.com/api/v1/repos/DagsHub-Datasets/spacenet-dataset/storage/content/s3/spacenet-dataset/LICENSE.md"
                    }
                  ],
                  "next_token": "next-token"
                }
        '404':
          description: Folder or file not found
    delete:
      tags:
        - Storage Integrations
      summary: Delete storage entries
      description: Delete files or directories from integrated storage. Requires repo admin permissions.
      operationId: deleteStorageContent
      parameters:
      - $ref: './components/parameters/storage/Owner.yaml'
      - $ref: './components/parameters/storage/Repository.yaml'
      - $ref: './components/parameters/storage/Protocol.yaml'
      - $ref: './components/parameters/storage/Bucket.yaml'
      - name: path
        in: path
        required: true
        description: The path to delete
        schema:
          type: string
      responses:
        '204':
          description: Deleted successfully
        '403':
          description: Forbidden — requires repo admin role
        '404':
          description: Path not found

  /repos/{owner}/{repo}/storage/raw/{protocol}/{bucket}/{path}:
    get:
      tags:
        - Storage Integrations
      summary: Get file in the bucket
      operationId: getBucketFile
      parameters:
      - $ref: './components/parameters/storage/Owner.yaml'
      - $ref: './components/parameters/storage/Repository.yaml'
      - $ref: './components/parameters/storage/Protocol.yaml'
      - $ref: './components/parameters/storage/Bucket.yaml'
      - name: path
        in: path
        required: true
        description: The content path
        schema: 
          type: string
      responses:
        '200':
          description: File downloaded
        '404':
          description: File not found

  /user:
    get:
      tags:
        - User
      operationId: GetAuthenticatedUser
      summary: Get authenticated user information
      responses:
        '200':
          description: successfully retrieved user information
          content:
            application/json:
              schema:
                $ref: './components/schemas/User.yaml'
  /users/{username}:
    get:
      tags:
        - User
      operationId: getUser
      summary: Get information about a user
      parameters:
        - $ref: './components/parameters/Username.yaml'
      responses:
        '200':
          description: successfully retrieved user information
          content:
            application/json:
              schema:
                $ref: './components/schemas/User.yaml'
  /repos/{owner}/{repo}/issues:
    parameters:
      - $ref: './components/parameters/Owner.yaml'
      - $ref: './components/parameters/Repository.yaml'
    get:
      tags:
        - Issues
      summary: List issues for a repository
      description: This endpoint may also return pull requests in the response. If an issue is a pull request, the object will include a pull_request key.
      operationId: listRepoIssues
      responses:
        '200':
          description: Successfully retrived the data
          content:
            application/json:
              schema: 
                $ref: './components/schemas/Issues.yaml'
    post:
      tags:
        - Issues
      summary: Create an issue
      description: Any user with read access to a repository can create an issue.
      operationId: createIssue
      requestBody: 
        content:
          application/json:
            schema: 
              $ref: './components/schemas/PostIssue.yaml'
      responses:
        '201':
          description: Successfully created an issue
          content:
            application/json:
              schema: 
                $ref: './components/schemas/Issue.yaml'
    patch:
      tags:
        - Issues
      summary: Edit an issue
      operationId: editIssue
      requestBody: 
        content:
          application/json:
            schema:
              $ref: './components/schemas/PatchIssue.yaml'
      responses:
        '201':
          description: Successfully created an issue
          content:
            application/json:
              schema: 
                $ref: './components/schemas/Issue.yaml'
  /repos/{owner}/{repo}/issues/{index}:
    get:
      tags:
        - Issues
      summary: Get a single issue
      description: This endpoint may also return pull requests in the response. If an issue is a pull request, the object will include a pull_request key.
      operationId: getIssue
      parameters:
      - $ref: './components/parameters/Owner.yaml'
      - $ref: './components/parameters/Repository.yaml'
      - $ref: './components/parameters/Index.yaml'
      responses:
        '200':
          description: Successfully retrived the data
          content:
            application/json:
              schema: 
                $ref: './components/schemas/Issue.yaml'
  /repos/{owner}/{repo}/experiments:
    get:
      tags:
        - Experiments
      summary: List Experiments
      description: Get a list of experiments in the given repository
      operationId: getExperiments
      parameters:
        - $ref: './components/parameters/Owner.yaml'
        - $ref: './components/parameters/Repository.yaml'
      responses:
        '200':
          description: retrieved experiments successfully
          content:
            application/json:
              schema:
                $ref: './components/schemas/ExperimentsResponse.yaml'
  /repos/{owner}/{repo}/experiments/metricsForExperiments:
    post:
      tags:
        - Experiments
      summary: Get experiment metrics for experiment
      operationId: getExperimentMetrics
      parameters:
      - $ref: './components/parameters/Owner.yaml'
      - $ref: './components/parameters/Repository.yaml'
      requestBody:
        content:
          application/json:
            schema:
              $ref: './components/schemas/ExperimentKeys.yaml'
      responses:
        '200':
          description: Retrieved experiments metrics
          content:
            application/json:
              schema:
                $ref: './components/schemas/ExperimentMetricsResponse.yaml'
  /repos/{owner}/{repo}/experiments/experiment/{experimentKey}:
    post:
      tags:
        - Experiments
      summary: Edit experiment info
      description: Edit experiment info, currently supports just changing experiment name.
      operationId: editExperiment
      parameters:
      - $ref: './components/parameters/Owner.yaml'
      - $ref: './components/parameters/Repository.yaml'
      - $ref: './components/parameters/ExperimentKey.yaml'
      requestBody:
        content:
          application/json:
            schema:
              $ref: './components/schemas/EditExperimentPost.yaml'
      responses:
        '200':
          description: Edit experiment info successfully
          content:
            application/json:
              schema:
                type: string
                description: The new experiment name
    delete: 
      tags:
        - Experiments
      summary: Delete experiment
      description: Support both git and MLflow experiments
      operationId: deleteExperiment
      parameters: 
      - $ref: './components/parameters/Owner.yaml'
      - $ref: './components/parameters/Repository.yaml'
      - $ref: './components/parameters/ExperimentKey.yaml'
      responses: 
        '200':
          description: Deleted experiment successfully
        '404':
          description: Experiment not found

  /repos/{owner}/{repo}/experiments/experiment/{experimentKey}/labels/{experimentLabel}:
    post:
      tags:
        - Experiments
      summary: Add label to experiment
      operationId: addExperimentLabel
      parameters:
        - $ref: './components/parameters/Owner.yaml'
        - $ref: './components/parameters/Repository.yaml'
        - $ref: './components/parameters/ExperimentKey.yaml'
        - $ref: './components/parameters/ExperimentLabel.yaml'
      responses:
        '404':
          description: Experiment not found
        '400':
          description: "Bad request"
        '200':
          description: Experiment label was added
          content:
            application/json:
              schema:
                type: string
                description: The added label name
    delete:
      tags:
        - Experiments
      summary: Delete experiment label
      operationId: deleteExperimentLabel
      parameters:
        - $ref: './components/parameters/Owner.yaml'
        - $ref: './components/parameters/Repository.yaml'
        - $ref: './components/parameters/ExperimentKey.yaml'
        - $ref: './components/parameters/ExperimentLabel.yaml'
      responses:
        '404':
          description: Label/experiment not found
        '400':
          description: "Bad request: experiment label name can be up to 128 characters long."
        '200':
          description: Experiment label was deleted
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                description: Remaining labels after deletion

  /repos/search:
    get:
      summary: Search repositories
      tags:
        - Repository
      operationId: search
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: uid
          in: query
          description: User ID to specify search whose repositories. Default is 0 and search all repositories
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: Maximum number of repositories in search results.
          schema:
            type: integer
            default: 10
        - name: page
          in: query
          description: Page number. Default is 1.
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: './components/schemas/RepositorySearchResponse.yaml'
  /repos/{owner}/{repo}:
    parameters:
      - $ref: './components/parameters/Owner.yaml'
      - $ref: './components/parameters/Repository.yaml'
    get:
      tags:
        - Repositories
      summary: Get repository information
      operationId: getRepo
      responses:
        '200':
          description: Repository information
          content:
            application/json:
              schema:
                $ref: './components/schemas/Repository.yaml'
        '404':
          description: Repository not found
    delete:
      tags:
        - Repositories
      summary: Delete a repository
      description: Permanently deletes a repository. Requires owner permissions.
      operationId: deleteRepo
      responses:
        '204':
          description: Repository deleted
        '403':
          description: Not authorized
        '404':
          description: Repository not found
  /user/repos:  
    get:
      summary: List your repositories
      description: |
        List repositories that are accessible to the authenticated user.

        This includes repositories owned by the authenticated user, repositories where the authenticated user is a collaborator, and repositories that the authenticated user has access to through an organization membership.
      operationId: listMyRepos
      tags:
        - Repository
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './components/schemas/Repository.yaml'
    post:
      tags:
        - Repository
      summary: Create
      description: Create a new repository for the authenticated user.
      operationId: createRepo
      requestBody:
        content:
          application/json:
            schema:
              $ref: './components/schemas/CreateRepo.yaml'
      responses:
        '201':
          description: Created
  /users/{username}/repos:
    get:
      summary: List user repositories
      description: List public repositories for the specified user.
      operationId: listUserRepos
      tags:
        - Repository
      parameters:
        - $ref: './components/parameters/Username.yaml'
      responses:
        '200':
          description: Success
  /orgs/{orgname}/repos:
    get:
      tags:
      - Repository
      operationId: listOrgRepos
      summary: List organization repositories
      description: List repositories that are accessible to the authenticated user.
      parameters:
        - $ref: './components/parameters/Orgname.yaml'
      responses:
        '200':
          description: Success
  /org/{orgname}/repos:
    post:
      tags:
        - Repository
      operationId: createOrgRepo
      summary: Create in organization
      description: Create a new repository in this organization. The authenticated user must be an **owner** of the specified organization.
      requestBody:
        content:
          application/json:
            schema:
              $ref: './components/schemas/CreateRepo.yaml'
      parameters:
        - $ref: './components/parameters/Orgname.yaml'
      responses:
        '201':
          description: Created
  /repos/migrate:
    post:
      tags:
        - Repository
      summary: Migrate repository 
      description: |
        Migrate a repository from other Git hosting sources for the authenticated user.

        To migrate a repository for a organization, the authenticated user must be a **owner** of the specified organization.
      operationId: migrateRepo
      requestBody:
        content:
          application/json:
            schema:
              $ref: './components/schemas/MigrateRepo.yaml'
      responses:
        '201': 
          description: Created
  /repos/{owner}/{repo}/raw/{ref}/{path}:
    get:
      tags:
        - Content
      summary: Download raw content
      description: This method returns the raw content of a file.
      operationId: getRaw
      parameters:
        - $ref: './components/parameters/Owner.yaml'
        - $ref: './components/parameters/Repository.yaml'
        - $ref: './components/parameters/Ref.yaml'
        - name: path
          in: path
          required: true
          description: The content path
          schema: 
            type: string
      responses:
        '200':
          description: OK
  /repos/{owner}/{repo}/archive/{ref}{format}:
    get:
      tags:
        - Content
      summary: Download archive
      description: This method returns archive by given format.
      operationId: getArchive
      parameters:
        - $ref: './components/parameters/Owner.yaml'
        - $ref: './components/parameters/Repository.yaml'
        - $ref: './components/parameters/Ref.yaml'
        - name: format
          in: path
          required: true
          description: The format of archive, either .zip or .tar.gz
          schema:
            type: string
            enum: [.zip, .tar.gz]
      responses:
        '200':
          description: OK
  /repos/{owner}/{repo}/branches:
    get:
      tags:
        - Branches
      operationId: listBranches
      summary: List Branches
      parameters:
        - $ref: './components/parameters/Owner.yaml'
        - $ref: './components/parameters/Repository.yaml'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './components/schemas/Branch.yaml'
  /repos/{owner}/{repo}/branches/{branch}:
    get:
      tags:
        - Branches
      summary: Get Branch
      operationId: getBranch
      parameters:
        - $ref: './components/parameters/Owner.yaml'
        - $ref: './components/parameters/Repository.yaml'
        - $ref: './components/parameters/Branch.yaml'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/schemas/Branch.yaml'
  /repos/{owner}/{repo}/collaborators/{collaborator}:
    put:
      tags:
        - Collaborators
      summary: Add user as a collaborator
      operationId: addCollaborator
      parameters:
        - $ref: './components/parameters/Owner.yaml'
        - $ref: './components/parameters/Repository.yaml'
        - $ref: './components/parameters/Collaborator.yaml'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                permission:
                  type: string
                  description: The permission to grant the collaborator. Can be one of **read**, **write** and **admin**.
                  default: write
      responses:
        '200':
          description: Success
    delete:
      tags:
        - Collaborators
      summary: Delete collaborator
      parameters:
        - $ref: './components/parameters/Owner.yaml'
        - $ref: './components/parameters/Repository.yaml'
        - $ref: './components/parameters/Collaborator.yaml'
      operationId: removeCollaborator
      responses:
        '204':
          description: No Content, deleted successfully
        '422':
          description: User does not exist
        '500':
          description: Internal error
  /repos/{owner}/{repo}/collaborators:
    get:
      tags:
        - Collaborators
      summary: Get collaborators
      operationId: getCollaborators
      parameters:
        - $ref: './components/parameters/Owner.yaml'
        - $ref: './components/parameters/Repository.yaml'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './components/schemas/Collaborator.yaml'
  /repos/{owner}/{repo}/annotations/access/users:
    parameters:
      - $ref: './components/parameters/Owner.yaml'
      - $ref: './components/parameters/Repository.yaml'
    get:
      tags:
        - Annotations
      summary: List user access entries for annotation projects
      description: Get a list of users with access to Label Studio annotation projects in the repository
      operationId: listLabelStudioUserAccess
      parameters:
        - $ref: './components/parameters/annotations/ProjectId.yaml'
      responses:
        '200':
          description: Successfully retrieved user access entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './components/schemas/annotations/LabelStudioProjectAccess.yaml'
  /repos/{owner}/{repo}/annotations/access/users/{userid}:
    parameters:
      - $ref: './components/parameters/Owner.yaml'
      - $ref: './components/parameters/Repository.yaml'
      - $ref: './components/parameters/annotations/UserId.yaml'
    get:
      tags:
        - Annotations
      summary: Get user access level for annotation projects
      description: Get the access level for a specific user and project (or all projects)
      operationId: getLabelStudioUserAccess
      parameters:
        - $ref: './components/parameters/annotations/ProjectId.yaml'
      responses:
        '200':
          description: Successfully retrieved user access level
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: integer
                    format: int64
                  project_id:
                    type: integer
                    format: int64
                  access_level:
                    type: string
                    enum: [none, annotator]
    put:
      tags:
        - Annotations
      summary: Grant user access to annotation projects
      description: Grant a user access to specific Label Studio annotation projects. User must be an organization member if the repo is owned by an organization.
      operationId: grantLabelStudioUserAccess
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/schemas/annotations/GrantLabelStudioAccess.yaml'
      responses:
        '204':
          description: Access granted successfully
        '400':
          description: User must be a member of the organization which owns the repo
        '404':
          description: User not found
    delete:
      tags:
        - Annotations
      summary: Revoke user access to annotation projects
      description: Revoke a user's access to Label Studio annotation projects
      operationId: revokeLabelStudioUserAccess
      parameters:
        - $ref: './components/parameters/annotations/ProjectId.yaml'
      responses:
        '204':
          description: Access revoked successfully
        '404':
          description: User not found
  /repos/{owner}/{repo}/annotations/access/teams:
    parameters:
      - $ref: './components/parameters/Owner.yaml'
      - $ref: './components/parameters/Repository.yaml'
    get:
      tags:
        - Annotations
      summary: List team access entries for annotation projects
      description: Get a list of teams with access to Label Studio annotation projects in the repository (organization repositories only)
      operationId: listLabelStudioTeamAccess
      parameters:
        - $ref: './components/parameters/annotations/ProjectId.yaml'
      responses:
        '200':
          description: Successfully retrieved team access entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './components/schemas/annotations/LabelStudioProjectAccess.yaml'
  /repos/{owner}/{repo}/annotations/access/teams/{teamid}:
    parameters:
      - $ref: './components/parameters/Owner.yaml'
      - $ref: './components/parameters/Repository.yaml'
      - $ref: './components/parameters/annotations/TeamId.yaml'
    get:
      tags:
        - Annotations
      summary: Get team access level for annotation projects
      description: Get the access level for a specific team and project (or all projects)
      operationId: getLabelStudioTeamAccess
      parameters:
        - $ref: './components/parameters/annotations/ProjectId.yaml'
      responses:
        '200':
          description: Successfully retrieved team access level
          content:
            application/json:
              schema:
                $ref: './components/schemas/annotations/LabelStudioProjectAccess.yaml'
    put:
      tags:
        - Annotations
      summary: Grant team access to annotation projects
      description: Grant a team access to specific Label Studio annotation projects (organization repositories only)
      operationId: grantLabelStudioTeamAccess
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/schemas/annotations/GrantLabelStudioAccess.yaml'
      responses:
        '204':
          description: Access granted successfully
        '404':
          description: Team not found
    delete:
      tags:
        - Annotations
      summary: Revoke team access to annotation projects
      description: Revoke a team's access to Label Studio annotation projects
      operationId: revokeLabelStudioTeamAccess
      parameters:
        - $ref: './components/parameters/annotations/ProjectId.yaml'
      responses:
        '204':
          description: Access revoked successfully
        '404':
          description: Team not found
  /admin/orgs/{orgname}/teams:
    parameters:
      - $ref: './components/parameters/Orgname.yaml'
    post:
      tags:
        - Organizations
      summary: Create an organization team
      description: Create a new team in an organization. Use team_type "annotator" to create an annotator team with access only to annotation projects.
      operationId: createOrgTeam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './components/schemas/annotations/CreateAnnotatorTeam.yaml'
      responses:
        '201':
          description: Team created successfully
        '400':
          description: Invalid team type or other validation error
  /admin/orgs/{orgname}:
    parameters:
      - $ref: './components/parameters/Orgname.yaml'
    delete:
      tags:
        - Organizations
      summary: Delete an organization
      description: Delete an organization. Set cascade to true to also delete dependent organization-owned repositories and relationships that block ordinary deletion.
      operationId: adminDeleteOrg
      parameters:
        - name: cascade
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: Organization deleted successfully
        '400':
          description: Invalid cascade query value
        '404':
          description: Organization not found
        '422':
          description: Organization cannot be deleted without cascade or has blocking dependencies
  /admin/users/{username}:
    parameters:
      - $ref: './components/parameters/Username.yaml'
    delete:
      tags:
        - Administration
      summary: Delete a user account
      description: Delete a user account. Set cascade to true to also delete dependent user-owned repositories, removable organization memberships, and sole-member organizations that block ordinary deletion.
      operationId: adminDeleteUser
      parameters:
        - name: cascade
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: User account deleted successfully
        '400':
          description: Invalid cascade query value
        '404':
          description: User not found
        '422':
          description: User cannot be deleted without cascade or has blocking dependencies
  /repos/{owner}/{repo}/commits/{sha}:
    get:
      tags:
        - Commits
      operationId: getCommit
      summary: Get a single commit
      parameters:
        - $ref: './components/parameters/Owner.yaml'
        - $ref: './components/parameters/Repository.yaml'
        - $ref: './components/parameters/Sha.yaml'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/schemas/Commit.yaml'
  /repos/{owner}/{repo}/hooks:
    parameters:
      - $ref: './components/parameters/Owner.yaml'
      - $ref: './components/parameters/Repository.yaml'
    get:
      tags:
        - Webhooks
      summary: List hooks
      operationId: listHooks
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './components/schemas/Webhook.yaml'
    post:
      tags:
        - Webhooks
      summary: Create a hook
      operationId: createHook
      requestBody:
        content:
          application/json: 
            schema:
              type: object
              properties:
                type:
                  type: string
                  description: The type of webhook
                  enum: 
                    - dagshub
                    - slack
                    - discord
                    - dingtalk
                  example: discord
                config: 
                  $ref: './components/schemas/WebhookConfig.yaml'
                events:
                  $ref: './components/schemas/WebhookEvents.yaml'
              required:
                - type
                - config
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: './components/schemas/Webhook.yaml'
  /repos/{owner}/{repo}/hooks/{id}:
    parameters:
        - $ref: './components/parameters/Owner.yaml'
        - $ref: './components/parameters/Repository.yaml'
        - name: id
          in: path
          schema:
            type: integer
          required: true
    patch:
      tags:
        - Webhooks
      summary: Edit a hook
      operationId: editHook
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                config:
                  $ref: './components/schemas/WebhookConfig.yaml'
                events:
                  $ref: './components/schemas/WebhookEvents.yaml'
                active:
                  type: boolean
                  description: Weather the hook is actually triggered on pushes or not. Ignore this field to leave it unchanged.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: './components/schemas/Webhook.yaml'
    delete:
      summary: Delete a hook
      operationId: deleteHook
      tags:
        - Webhooks
      responses:
        '204':
          description: No Content, deleted successfully
  /repos/{owner}/{repo}/data-engine/blob-preview/{value}:
    parameters:
      - $ref: './components/parameters/Owner.yaml'
      - $ref: './components/parameters/Repository.yaml'
      - name: value
        in: path
        required: true
        schema:
          type: string
        description: |
          Blob identifier to fetch a preprocessed video preview.
          Can be a 64-char metadata blob hash, or a pointer blob value (`pointer://datasourcepath/...`) URL-encoded for path safety.
    get:
      tags:
        - Data Engine
      summary: Get Data Engine blob preview clip
      operationId: getDataEngineBlobPreview
      responses:
        '200':
          description: Preprocessed video preview clip
          content:
            video/mp4:
              schema:
                type: string
                format: binary
        '404':
          description: Preview clip not found

  /repos/{owner}/{repo}/data-engine/blob/{sha}:
    get:
      tags:
        - Data Engine
      summary: Download a metadata blob by SHA
      description: |
        Download a raw metadata blob by its 64-character SHA hash.
        > **Note:** This endpoint is part of the Data Engine feature and may not be stable.
      operationId: getDataEngineBlob
      parameters:
        - $ref: './components/parameters/Owner.yaml'
        - $ref: './components/parameters/Repository.yaml'
        - name: sha
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-f0-9]{64}$'
          description: 64-character SHA hash of the blob
      responses:
        '200':
          description: Blob content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          description: Blob not found

  /repos/{owner}/{repo}/data-engine/create-dataset:
    post:
      tags:
        - Data Engine
      summary: Create a new dataset (datasource)
      description: |
        Creates a new dataset (datasource) in the repository's Data Engine.
        > **Note:** This endpoint is part of the Data Engine feature and may not be stable.
      operationId: createDataset
      parameters:
        - $ref: './components/parameters/Owner.yaml'
        - $ref: './components/parameters/Repository.yaml'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Dataset name
                datasource_type:
                  type: string
                  description: Type of datasource
      responses:
        '201':
          description: Dataset created
        '403':
          description: Forbidden — requires write access

  /repos/{owner}/{repo}/data-engine/import/metadata:
    post:
      tags:
        - Data Engine
      summary: Import metadata from file
      description: |
        Upload a CSV/JSON file to import metadata into the Data Engine.
        Returns a task ID to poll for completion.
        > **Note:** This endpoint is part of the Data Engine feature and may not be stable.
      operationId: importDataEngineMetadata
      parameters:
        - $ref: './components/parameters/Owner.yaml'
        - $ref: './components/parameters/Repository.yaml'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '202':
          description: Import task started
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
        '403':
          description: Forbidden — requires write access

  /repos/{owner}/{repo}/data-engine/import/metadata/{taskid}:
    get:
      tags:
        - Data Engine
      summary: Get metadata import task status
      description: |
        Poll the status of a metadata import task.
        > **Note:** This endpoint is part of the Data Engine feature and may not be stable.
      operationId: getDataEngineImportTaskStatus
      parameters:
        - $ref: './components/parameters/Owner.yaml'
        - $ref: './components/parameters/Repository.yaml'
        - name: taskid
          in: path
          required: true
          schema:
            type: string
          description: Task ID returned from the import endpoint
      responses:
        '200':
          description: Task status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [pending, running, completed, failed]
                  message:
                    type: string

  # ── Users (public) ───────────────────────────────────────────────────────────

