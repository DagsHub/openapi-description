      - $ref: './components/parameters/Repository.yaml'
    get:
      tags:
        - Annotations
      summary: Keep annotation workspace alive
      description: |
        Sends a keep-alive signal to the annotation workspace to prevent it from being
        shut down due to inactivity. Call this periodically (e.g., every few minutes)
        while users are actively using the workspace.
      operationId: keepWorkspaceAlive
      parameters:
        - name: service
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Keep-alive acknowledged

