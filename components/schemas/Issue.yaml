type: object
properties:
  id:
    type: integer
    format: int64
  number:
    type: integer
    format: int64
    description: Issue index within the repository
  user:
    $ref: './User.yaml'
  title:
    type: string
  body:
    type: string
  labels:
    type: array
    items:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        color:
          type: string
        url:
          type: string
  milestone:
    type: object
    nullable: true
    properties:
      id:
        type: integer
      title:
        type: string
      description:
        type: string
      state:
        type: string
      open_issues:
        type: integer
      closed_issues:
        type: integer
      closed_at:
        type: string
      due_on:
        type: string
  assignee:
    $ref: './User.yaml'
    nullable: true
  state:
    type: string
    enum: [open, closed]
  comments:
    type: integer
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
  pull_request:
    type: object
    nullable: true
    description: Present when the issue is associated with a pull request
