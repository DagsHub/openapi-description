      operationId: listAccessTokens
      security:
        - basicAuth: []
      responses:
        '200':
          description: List of access tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    sha1:
                      type: string
                      description: Token value (only shown on creation)
    post:
      tags:
        - User
      summary: Create an access token
      operationId: createAccessToken
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '201':
          description: Token created
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  sha1:
                    type: string

  /user/tokens/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    delete:
      tags:
        - User
      summary: Delete an access token
      operationId: deleteAccessToken
      responses:
        '204':
          description: Token deleted
        '404':
          description: Token not found

