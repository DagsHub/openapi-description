type: object
properties:
  ID:
    type: string
  RepoID:
    type: integer
  CommitID:
    type: string
  TimeUnixMs:
    type: integer
    format: int64
  Tags:
    type: object
    additionalProperties:
      oneOf:
        - type: string
        - type: integer
  Name:
    type: string
  MetricsByPath:
    type: object
    additionalProperties:
      type: object
  HyperParamsByPath:
    type: object
    additionalProperties:
      type: array
      items:
        type: object
        properties:
          ExperimentID:
            oneOf:
              - type: string
              - type: integer
          Name:
            type: string
          Value:
            type: string
          Path:
            type: string
  Labels:
    type: array
    items:
      type: string
  Errors:
    type: array
    items:
      type: string
  Source:
    type: string
  Group:
    type: string