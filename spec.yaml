  /repos/{owner}/{repo}/file-access-jwt:
    parameters:
      - $ref: './components/parameters/Owner.yaml'
      - $ref: './components/parameters/Repository.yaml'
    post:
      tags:
        - Repositories
      summary: Generate a file access JWT
      description: |
        Generates a short-lived RS256 JWT for unauthenticated access to a specific file or path prefix.
        Useful for sharing files with external services like Google Colab or Run:ai JupyterLab
        where authentication headers cannot be provided.

        The returned `raw_url` can be opened directly in a browser or passed to an external service.
      operationId: generateFileAccessJWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  description: |
                    Path to the file or path prefix.
                    Use `path/to/file.ipynb` for exact file access.
                    Use `path/to/folder/*` for folder prefix access.
                gitRef:
                  type: string
                  description: Git ref (branch, tag, commit SHA). Defaults to the default branch.
      responses:
        '200':
          description: JWT and pre-built raw URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  jwt:
                    type: string
                    description: RS256 JWT token
                  expires_in_seconds:
                    type: integer
                    format: int64
                  raw_url:
                    type: string
                    description: Full URL to access the file with the embedded JWT
        '503':
          description: JWT signing not configured on this server

  /repos/{owner}/{repo}/forks:
    parameters:
      - $ref: './components/parameters/Owner.yaml'
      - $ref: './components/parameters/Repository.yaml'
    get:
      tags:
        - Repositories
      summary: List forks of a repository
      operationId: listForks
      responses:
        '200':
          description: List of forks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './components/schemas/Repository.yaml'

