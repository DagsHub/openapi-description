          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    verified:
                      type: boolean
                    primary:
                      type: boolean
    post:
      tags:
        - User
      summary: Add an email address
      operationId: addEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                emails:
                  type: array
                  items:
                    type: string
                    format: email
      responses:
        '201':
          description: Emails added
    delete:
      tags:
        - User
      summary: Delete email addresses
      operationId: deleteEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                emails:
                  type: array
                  items:
                    type: string
                    format: email
      responses:
        '204':
          description: Emails deleted

  /user/followers:
    get:
      tags:
        - User
      summary: List the authenticated user's followers
      operationId: listMyFollowers
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Followers
          content:
            application/json:
              schema:
                type: array
                items:
