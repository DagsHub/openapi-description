          description: Teams in the organization
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './components/schemas/Team.yaml'

  /orgs/{orgname}/teams/repo:
    parameters:
      - $ref: './components/parameters/Orgname.yaml'
    get:
      tags:
        - Organizations
      summary: Search teams in an organization by name
      description: Searches teams in an organization by keyword. Useful for autocomplete when adding a repository to a team.
      operationId: listTeamsForRepo
      parameters:
        - name: q
          in: query
          description: Team name search keyword
          schema:
            type: string
      responses:
        '200':
          description: Matching teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './components/schemas/Team.yaml'

  /orgs/{orgname}/members:
    parameters:
      - $ref: './components/parameters/Orgname.yaml'
    get:
      tags:
        - Organizations
      summary: List members of an organization
      operationId: listOrgMembers
      responses:
        '200':
          description: Organization members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: './components/schemas/User.yaml'

  /orgs/{orgname}/teams/{teamid}/members/{username}:
    parameters:
      - $ref: './components/parameters/Orgname.yaml'
      - name: teamid
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: username
        in: path
        required: true
        schema:
          type: string
    put:
      tags:
        - Organizations
      summary: Add a member to a team
      description: Requires org owner permissions.
      operationId: addTeamMember
      responses:
        '204':
          description: Member added
        '403':
          description: Not org owner
        '404':
          description: Team or user not found
    delete:
      tags:
        - Organizations
      summary: Remove a member from a team
      description: Requires org owner permissions.
      operationId: removeTeamMember
      responses:
        '204':
          description: Member removed
        '403':
          description: Not org owner
        '404':
          description: Team or user not found

  /orgs/{orgname}/teams/{teamid}/members/invite:
    parameters:
      - $ref: './components/parameters/Orgname.yaml'
      - name: teamid
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      tags:
        - Organizations
      summary: Invite users to a team by email
      description: Sends invitation emails to the provided addresses. Requires org owner permissions.
      operationId: inviteTeamMembers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emails]
              properties:
                emails:
                  type: array
                  items:
                    type: string
                    format: email
      responses:
        '204':
          description: Invitations sent
        '403':
          description: Not org owner

  /orgs/{orgname}/teams/{teamid}/annotations/projects:
    parameters:
      - $ref: './components/parameters/Orgname.yaml'
      - name: teamid
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags:
        - Annotations
      summary: List Label Studio projects assigned to a team
      description: Lists all annotation projects that this team has access to, across all repositories in the organization. Requires org owner or team member.
      operationId: listTeamLabelStudioProjects
      responses:
        '200':
          description: Label Studio projects assigned to the team
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      format: int64
                    repo_id:
                      type: integer
                      format: int64
                    repo_name:
                      type: string
                    repo_owner:
                      type: string
                    project_id:
                      type: integer
                      format: int64
                      description: -1 means wildcard access to all projects
                    project_name:
                      type: string
                    access_level:
                      type: string
                      enum: [none, annotator]
                    created_unix:
                      type: integer
                      format: int64

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: |
       Use your DagsHub username and password/access token.
    tokenAuth:
      type: apiKey
      in: query
      name: token
      description: |
        You can generate a token [here](http://dagshub.com/user/settings/tokens)
