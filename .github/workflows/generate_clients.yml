# This is a basic workflow to help you get started with Actions

name: Generate API Client Libraries

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch: 

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Setup Java for OpenAPI Generator
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: remove 'api-clients' folder
        run: rm -rf api-clients

      - name: Clone Github Repo Action
        uses: GuillaumeFalourd/clone-github-repo-action@v2
        with:
          owner: DagsHub
          repository: api-clients

      - name: Generate client libraries
        run: |
          cd api-clients
          git pull
          bash update_clients.sh
          git checkout -b update-clients-${{ github.run_number }}
          git add .
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Update api clients"

      - name: GitHub Push
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.PAT }}
          branch: update-clients-${{ github.run_number }}
          directory: api-clients
          repository: DagsHub/api-clients

      - name: Open a PR
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          cd api-clients
          gh pr create --repo DagsHub/api-clients \
            --base main \
            --head update-clients-${{ github.run_number }} \
            --title "Update API Clients" \
            --body "Automated clients update due to an update in the [OpenAPI description](https://github.com/DagsHub/openapi-description/)" \
          || echo "PR already exists or nothing to update"
    
